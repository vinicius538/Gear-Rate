{% extends 'base.html' %}

{% block title %}
Configurações - GR
{% endblock %}

{% block content %}
<div class="flex justify-center py-12">
    <div class="w-full max-w-3xl bg-gradient-to-r from-[#141420] to-[#16163B] rounded-2xl border border-purple-500 shadow-lg p-8">

        <h1 class="text-3xl font-bold text-center text-purple-600 mb-8">
            Configurações da Conta
        </h1>

        <div class="bg-gradient-to-r from-[#141420] to-[#16163B] border border-purple-500 rounded-xl p-6">
            <h2 class="text-xl text-white font-semibold mb-4">
                Informações atuais
            </h2>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-gray-300 text-sm">Nome</p>
                    <p class="font-medium text-purple-500">{{ session["nome"] }}</p>
                </div>

                <div>
                    <p class="text-gray-300 text-sm">Sobrenome</p>
                    <p class="font-medium text-purple-500">{{ session["sobrenome"] }}</p>
                </div>

                <div>
                    <p class="text-gray-300 text-sm">Email</p>
                    <p class="font-medium text-purple-500">{{ session["email"] }}</p>
                </div>

                <div>
                    <p class="text-gray-300 text-sm">Senha</p>
                    <p class="font-medium text-purple-500">••••••••</p>
                </div>
            </div>
        </div>

        <form method="POST"
              action="{{ url_for('route.update') }}"
              class="space-y-5 mt-2">

            <h2 class="text-xl text-white font-semibold">
                Alterar dados
            </h2>

            <div class="grid md:grid-cols-2 gap-4 text-white">

                <input
                    type="text"
                    name="up_nome"
                    placeholder="Novo nome"
                    class="border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-500"
                >

                <input
                    type="text"
                    name="up_sobrenome"
                    placeholder="Novo sobrenome"
                    class="border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-500"
                >

                <input
                    type="email"
                    name="up_email"
                    placeholder="Novo email"
                    class="border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-500"
                >

                <input
                    type="password"
                    name="up_senha"
                    placeholder="Nova senha"
                    class="border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-500"
                >

            </div>

            <button
                type="submit"
                class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg font-semibold transition cursor-pointer"
            >
                Salvar alterações
            </button>
        </form>
    </div>
</div>
{% endblock %}
